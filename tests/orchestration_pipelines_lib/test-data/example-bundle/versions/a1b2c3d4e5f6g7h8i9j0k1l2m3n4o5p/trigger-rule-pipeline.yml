modelVersion: "1.0"
pipelineId: "trigger-rule-pipeline"
description: "A pipeline that test the trigger rule flag."
runner: airflow
owner: "example-owner"

defaults:
  projectId: "example-project"
  location: "us-central1"
  executionConfig:
    retries: 0

triggers:
  - schedule:
      interval: "0 5 * * *"
      startTime: "2025-10-01T00:00:00"
      endTime: "2026-10-01T00:00:00"
      catchup: false
      timezone: "UTC"

actions:
  - python:
      name: "failed_python_code"
      mainFilePath: "scripts/failing_script.py"
      pythonCallable: "fail_with_zero_division_error"
      engine:
        local: {}
  - python:
      name: "normal_python_code"
      mainFilePath: "scripts/lib1.py"
      dependsOn:
        - "failed_python_code"
      pythonCallable: "hello_lib1"
      triggerRule: all_failed
      engine:
        local: {}
