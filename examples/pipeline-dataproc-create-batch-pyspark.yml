modelVersion: "1.0"
pipelineId: "pipeline-dataproc-create-batch-pyspark"
description: "A pipeline with a DataprocCreateBatch task."
runner: "airflow"
owner: "data-eng-team"
tags: ["dataproc_create_batch", "example"]

defaults:
  projectId: "your-gcp-project-id"
  location: "us-central1"
  executionConfig:
    retries: 0

actions:
  - pyspark:
      name: "run-pyspark-on-dataproc-serverless"
      mainFilePath: "./scripts/my_spark_job_with_pyfiles.py"
      params:
        var1: "value1"
        var2: "value2"
      pyFiles:
        - "./scripts/lib1.py"
      engine:
        dataprocServerless:
          location: "us-central1"
          resourceProfile:
            inline:
              environmentConfig:
                executionConfig:
                  serviceAccount: "your-service-account@your-gcp-project-id.iam.gserviceaccount.com"
                  networkUri: "projects/your-gcp-project-id/global/networks/default"
              runtimeConfig:
                version: "2.3"
                properties:
                  spark.app.name: "run-pyspark-on-dataproc-serverless-10nov"
                  spark.executor.instances: "2"
                  spark.driver.cores: "4"
                  spark.dataproc.driverEnv.PYTHONPATH: "./libs/lib/python3.11/site-packages"
                  spark.executorEnv.PYTHONPATH: "./libs/lib/python3.11/site-packages"
